#!name = PingMe
#!desc = 获取Cookie与自动签到
#!author = fmz200
#!icon = https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/PingMe.png

name: "PingMe"
description: "获取Cookie与自动签到"
author: "fmz200"
icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/PingMe.png"

params:
  - name: COOKIE_BTN
    type: string
    default: ""
    description: "输入 # 关闭Cookie获取，留空则开启"
  - name: SIGN_BTN
    type: string
    default: ""
    description: "输入 # 关闭签到，留空则开启"

scriptings:
  - http_request:
      name: PingMe获取Cookie
      match: ^https?:\/\/api\.pingmeapp\.net\/app\/queryBalanceAndBonus
      script_url: https://raw.githubusercontent.com/lylywayr/egern/refs/heads/main/PingMeCookie.js
      timeout: 60
      disabled: {{ eq .params.COOKIE_BTN "#" }}
  - schedule:
      name: PingMe签到
      cron: "30 8,20 * * *"
      script_url: https://raw.githubusercontent.com/lylywayr/egern/refs/heads/main/PineMeSign.js
      timeout: 300
      disabled: {{ eq .params.SIGN_BTN "#" }}

mitm:
  hostnames:
    - api.pingmeapp.net