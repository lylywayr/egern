#!name = PingMe
#!desc = 获取Cookie与自动签到（无需BoxJs）
#!author = fmz200
#!icon = https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/PingMe.png

name: "PingMe"
description: "获取Cookie与自动签到（无需BoxJs）"
author: "fmz200"
icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/PingMe.png"

env_schema:
  COOKIE_BTN:
    name: "获取Cookie"
    description: "开启后，打开PingMe自动抓取登录参数"
    default_value: "true"
    options: ["true", "false"]
  SIGN_BTN:
    name: "签到"
    description: "开启后，每天 8:30 / 20:30 自动签到+视频奖励"
    default_value: "true"
    options: ["true", "false"]

scriptings:
  - http_request:
      name: PingMe获取Cookie
      match: ^https?:\/\/api\.pingmeapp\.net\/app\/queryBalanceAndBonus
      script_url: https://raw.githubusercontent.com/lylywayr/egern/refs/heads/main/PingMeCookie.js
      timeout: 60
      env:
        ENABLE_COOKIE: "{{ .env.COOKIE_BTN }}"
  - schedule:
      name: PingMe签到
      cron: "30 8,20 * * *"
      script_url: https://raw.githubusercontent.com/lylywayr/egern/refs/heads/main/PineMeSign.js
      timeout: 300
      env:
        ENABLE_SIGN: "{{ .env.SIGN_BTN }}"

mitm:
  hostnames:
    - api.pingmeapp.net